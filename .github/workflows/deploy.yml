name: Deploy to GitHub Pages

# Stratégie (Lot 1 / THI-9) : la source GitHub Pages est réglée sur la BRANCHE `gh-pages`
# (build « pages build and deployment » géré par GitHub). On construit ici le site puis on
# pousse `.output/public` sur `gh-pages` ; GitHub publie ensuite automatiquement.
#
# Pourquoi pas actions/deploy-pages (source « GitHub Actions ») ? Le compte est verrouillé
# pour facturation → les workflows Actions ne démarrent pas, ALORS QUE le build par branche,
# lui, n'est pas affecté et sert le site. Ce workflow se réactivera tout seul à la
# régularisation de la facturation ; d'ici là, déploiement manuel via `pnpm run deploy`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # nécessaire pour pousser sur la branche gh-pages

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm generate
        env:
          # baseURL = /<repo>/ pour GitHub Pages projet. Adapter si domaine custom (avenant).
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
          # site.url = origine SEULE. Le sous-chemin /<repo>/ vient de baseURL ;
          # l'inclure ici aussi doublerait le chemin dans le sitemap (.../<repo>/<repo>/...).
          NUXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public
          publish_branch: gh-pages
          # Le preset Nitro github_pages génère déjà .nojekyll ; on garde les dotfiles.
          enable_jekyll: false
